<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MyWebsite</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9; }
        h2 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
        .message { text-align: center; margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Create Account</h2>
    <form id="registerForm">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="Choose a username">
        
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Create a password" minlength="6">
        
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="Confirm your password">
        
        <button type="submit">Register</button>
    </form>
    
    <div id="message"></div>
    
    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="login.html">Login here</a>
    </p>

    <script>
        function getUsers() {
            return JSON.parse(localStorage.getItem('users')) || [];
        }
        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('message');

            if (password !== confirm) return msg.innerHTML = '<div class="message error">Passwords do not match!</div>';
            if (password.length < 6) return msg.innerHTML = '<div class="message error">Password must be at least 6 characters.</div>';

            let users = getUsers();
            if (users.some(u => u.username === username)) {
                return msg.innerHTML = '<div class="message error">Username already taken!</div>';
            }

            users.push({ username, password });
            saveUsers(users);

            msg.innerHTML = '<div class="message success">Registration successful! Redirecting...</div>';
            setTimeout(() => window.location.href = 'login.html', 1500);
        });
    </script>
</body>
</html>
