<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyWebsite</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9; }
        h2 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
        .message { text-align: center; margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Login</h2>
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" required>
        
        <label for="password">Password</label>
        <input type="password" id="password" required>
        
        <button type="submit">Login</button>
    </form>
    
    <div id="message"></div>
    
    <p style="text-align: center; margin-top: 20px;">
        Don't have an account? <a href="register.html">Register here</a>
    </p>

    <script>
        function getUsers() {
            return JSON.parse(localStorage.getItem('users')) || [];
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                msg.innerHTML = `<div class="message success">Login successful! Welcome, ${username}!</div>`;
            } else {
                msg.innerHTML = '<div class="message error">Invalid username or password!</div>';
            }
        });
    </script>
</body>
</html>
